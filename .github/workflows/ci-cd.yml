name: CI/CD Pipeline to Render

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- 1. CONTINUOUS INTEGRATION (CI) ---
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' 
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint code with flake8 (Syntax Check)
        run: |
          # Stop the build if there are Python syntax errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat other formatting issues as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # --- 2. CONTINUOUS DEPLOYMENT (CD) ---
  deploy:
    needs: build-and-test  # DEPLOY tabhi chalega jab BUILD-AND-TEST pass hoga
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deployment
        run: curl -s ${{ secrets.RENDER_DEPLOY_HOOK }}